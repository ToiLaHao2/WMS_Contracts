syntax = "proto3";

package mes;

// Option này rất quan trọng cho tầng Go sau này
option go_package = "github.com/devil/wmss/contracts/mes;mes";

// Dịch vụ Pathfinding (Tìm đường)
service PathfindingService {
  // Định nghĩa một hàm có thể gọi từ xa (RPC - Remote Procedure Call)
  rpc CalculatePath (PathRequest) returns (PathResponse);
}

// Cấu trúc dữ liệu Tọa độ cơ bản
message Point {
  int32 x = 1;
  int32 y = 2;
}

// Request: Dữ liệu yêu cầu tìm đường
message PathRequest {
  string warehouse_id = 1; // Để Python biết lấy bản đồ kho nào từ Redis
  Point start = 2;         // Điểm hiện tại của AGV
  Point end = 3;           // Điểm đến (Docks, Charging...)
}

// Response: Kết quả tìm đường từ MES
message PathResponse {
  repeated Point waypoints = 1; // Danh sách các điểm cần đi qua (Mảng các Point)
  bool success = 2;             // True nếu tìm thấy đường, False nếu bị kẹt cứng
  string message = 3;           // Thông báo lỗi nếu có
}


// Dịch vụ cấp phát vị trí (Slot allocation)
service SlotAllocationService {
  rpc AllocateSlot (SlotAllocationRequest) returns (SlotAllocationResponse);
}

// Request: Dữ liệu yêu cầu cấp phát vị trí
message SlotAllocationRequest {
  string warehouse_id = 1;
  string item_id = 2;
  float length = 3;
  float width = 4;
}

// Response: Kết quả cấp phát vị trí từ MES
message SlotAllocationResponse {
  bool success = 1;
  string slot_id = 2;
  string message = 3;
  string error_code = 4;
}


// Dịch vụ điều phối AGV — nối Slot Allocation + Pathfinding thành 1 kế hoạch chạy
service DispatchService {
  rpc DispatchAGV (DispatchRequest) returns (DispatchResponse);
}

// Request: Thông tin cần để MES lập kế hoạch chạy cho AGV
message DispatchRequest {
  string warehouse_id = 1;     // ID của kho
  string inbound_order_id = 2; // ID lệnh nhập (để trace)
  Point  agv_position = 3;     // Tọa độ hiện tại của AGV được chọn
  Point  pickup_point = 4;     // Điểm lấy hàng (VD: Cửa kho)
  Point  slot_position = 5;    // Tọa độ Slot đích cần cất hàng
  string agv_id = 6;           // ID của AGV được phân công
}

// Một bước trong kế hoạch di chuyển (để phân biệt gắp hàng / cất hàng)
enum ActionType {
  MOVE = 0;      // Di chuyển thuần túy
  PICK_UP = 1;   // Dừng lại và gắp hàng
  DROP_OFF = 2;  // Dừng lại và cất hàng
  RETURN = 3;    // Quay về dock (di chuyển không mang hàng)
}

// Một waypoint kèm hành động tại điểm đó
message WaypointAction {
  Point      position = 1;
  ActionType action   = 2;
}

// Response: Execution Plan đầy đủ cho 1 AGV
message DispatchResponse {
  bool                   success    = 1;
  string                 message    = 2;
  repeated WaypointAction waypoints = 3; // Danh sách tọa độ + hành động theo thứ tự
}